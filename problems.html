    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f8; color: #222; }
    .sticky { position: sticky; top: 0; z-index: 10; background: white; border-bottom: 1px solid #e0e0e0; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .sticky h1 { font-size: 16px; font-weight: 700; flex: 1; }
    .tabs { display: flex; gap: 4px; }
    .tab { padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: #eee; color: #555; }
    .tab.active { background: #222; color: white; }
    .count { font-size: 13px; color: #888; }
    .container { max-width: 780px; margin: 0 auto; padding: 24px 20px 80px; }
    .cat-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #aaa; margin: 32px 0 8px; }
    .item { display: flex; align-items: flex-start; gap: 12px; padding: 11px 14px; border-radius: 9px; cursor: pointer; transition: background 0.12s; user-select: none; background: white; margin-bottom: 5px; border: 1px solid #ebebeb; }
    .item:hover { background: #f0f0f0; border-color: #d8d8d8; }
    .item.out { background: #fafafa; border-color: #f0f0f0; }
    .item.out .num, .item.out .text { color: #ccc; text-decoration: line-through; }
    .num { font-size: 12px; font-weight: 700; color: #bbb; min-width: 26px; padding-top: 1px; }
    .text { font-size: 14px; line-height: 1.5; }
    .badge { font-size: 11px; background: #f0f0f0; color: #888; padding: 2px 7px; border-radius: 10px; margin-left: auto; white-space: nowrap; }
    .eliminated .item { opacity: 0.6; }
    .eliminated .num { color: #ddd; }
    .eliminated .text { color: #bbb; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .empty { text-align: center; color: #bbb; padding: 60px 0; font-size: 14px; }
  </style>
</head>

let currentTab = 'kept';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const el = document.getElementById('list');
  el.innerHTML = '';
  let count = 0;

  data.forEach(({ cat, items }) => {
    const filtered = items.filter(([num]) =>
      currentTab === 'kept' ? KEPT.has(num) : !KEPT.has(num)
    );
    if (!filtered.length) return;

    const label = document.createElement('div');
    label.className = 'cat-label';
    label.textContent = cat;
    el.appendChild(label);

    filtered.forEach(([num, text]) => {
      const div = document.createElement('div');
      div.className = 'item' + (currentTab === 'eliminated' ? ' out' : '');
      div.innerHTML = `<span class="num">${num}</span><span class="text">${text}</span>`;
      el.appendChild(div);
      count++;
    });
  });

  const label = currentTab === 'kept' ? `남은 문제: ${count}개` : `제외한 문제: ${count}개`;
  document.getElementById('count').textContent = label;
}

render();
